global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'userapi'

    metrics_path: /metrics

    static_configs:
      - targets:
          - 'userapi-1:8080'
          - 'userapi-2:8080'
          - 'userapi-3:8080'

  - job_name: 'mediaapi'

    metrics_path: /metrics

    static_configs:
      - targets:
          - 'mediaapi:8080'