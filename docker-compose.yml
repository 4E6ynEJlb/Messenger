services:
  maintenance:
    image: ${DOCKER_REGISTRY-}maintenance
    build:
      context: .
      dockerfile: Maintenance/Dockerfile
    depends_on:
      - npgsql-container
      - flyway
      - loki

  userapi-1:
    image: ${DOCKER_REGISTRY-}userapi
    build:
      context: .
      dockerfile: UserAPI/Dockerfile
    depends_on:
      - npgsql-container
      - flyway
      - mediaapi
      - redis-1
      - redis-2
      - kafka
      - loki
      - prometheus
      - grafana
  userapi-2:
    image: ${DOCKER_REGISTRY-}userapi
    build:
      context: .
      dockerfile: UserAPI/Dockerfile
    depends_on:
      - npgsql-container
      - flyway
      - mediaapi
      - redis-1
      - redis-2
      - kafka
      - loki
      - prometheus
      - grafana
  userapi-3:
    image: ${DOCKER_REGISTRY-}userapi
    build:
      context: .
      dockerfile: UserAPI/Dockerfile
    depends_on:
      - npgsql-container
      - flyway
      - mediaapi
      - redis-1
      - redis-2
      - kafka
      - loki
      - prometheus
      - grafana
 

  mediaapi:
    image: ${DOCKER_REGISTRY-}mediaapi
    build:
      context: .
      dockerfile: MediaAPI/Dockerfile


  npgsql-container:
    image: postgres:latest
    ports:
      - 5433:5432
    environment: 
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=zz778899
      - POSTGRES_DB=messenger_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql


  minio:
    container_name: minio
    restart: unless-stopped
    image: minio/minio
    volumes:
      - miniodata:/data
    expose:
      - "9000"
    ports:
      - "9000:9000"
    command: server /data  


  flyway:
    image: flyway/flyway:10
    container_name: flyway
    depends_on:
      npgsql-container:
        condition: service_healthy
    command:
      - -locations=filesystem:/flyway/sql
      - migrate
    volumes:
      - ./migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://npgsql-container:5432/messenger_db
      FLYWAY_USER: postgres
      FLYWAY_PASSWORD: zz778899


  redis-1:
     image: redis
     ports: 
       - "6379:6379"
     restart: always
  redis-2:
     image: redis
     ports: 
       - "6380:6379"
     restart: always


  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/bitnami/kafka


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "9080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka


  loki:
    image: grafana/loki:master
    ports:
       - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    restart: on-failure


  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: on-failure


  grafana:
    image: grafana/grafana:master
    environment:
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    volumes:
      - grafana:/var/lib/grafana
      - ./provisioning/plugins:/etc/grafana/provisioning/plugins
      - ./grafanaConfiguration:/etc/grafana/provisioning/
      - ./provisioning/notifiers:/etc/grafana/provisioning/notifiers
    depends_on:
      - loki
      - prometheus
    restart: on-failure

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - userapi-1
      - userapi-2
      - userapi-3



volumes:
  miniodata:
  db-data:
  kafka-data:
  grafana: ~
  loki: ~