events {
}

http {

    client_max_body_size 2048M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream userapi_cluster {

        ip_hash;

        server userapi-1:8080;
        server userapi-2:8080;
        server userapi-3:8080;
        server userapi-4:8080;
    }

    upstream media_cluster {

        ip_hash;

        server mediaapi:8080;
    }

    server {

        listen 80;

        location /userapi/ {

            proxy_pass http://userapi_cluster/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        location /media/ {

            proxy_pass http://media_cluster/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}